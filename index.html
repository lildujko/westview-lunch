<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Westview Lunch</title>
    <style>
        body {font-family: Arial, margin:0; background:#f4f6fb;}
        .app {max-width:600px;margin:auto;background:white;min-height:100vh;}
        header {background:#1f6feb;color:white;padding:15px;text-align:center;}
        .screen{display:none;padding:20px;}
        .active{display:block;}
        .btn{width:100%;padding:12px;margin-top:10px;background:#1f6feb;color:white;border:none;border-radius:8px;cursor:pointer;}
        .item{display:flex;justify-content:space-between;background:#f9fafc;padding:10px;margin:5px 0;border-radius:8px;}
        .cart-section{margin-top:20px;border-top:1px solid #ddd;padding-top:10px;}
        .cart-item{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #eee;}
        .cart-item:last-child{border-bottom:none;}
        .order{border:1px solid #ddd;border-radius:8px;margin:10px 0;padding:10px;}
    </style>
</head>
<body>

<div class="app">
    <header><h2>Westview Lunch</h2></header>

    <!-- Login Screen -->
    <div id="loginScreen" class="screen active">
        <input id="username" placeholder="Username (Jackson or staff)">
        <input id="password" type="password" placeholder="Password (1234 or school123)">
        <button class="btn" onclick="login()">Login</button>
    </div>

    <!-- Student Screen -->
    <div id="studentScreen" class="screen">
        <h3>Menu</h3>
        <div id="menu"></div>
        <div class="cart-section">
            <h3>Your Cart</h3>
            <div id="cart"></div>
            <div id="cartTotal"><strong>Total:</strong> $0.00</div>
            <button class="btn" onclick="submitOrder()">Submit Order</button>
        </div>
        <button class="btn" onclick="logout()">Logout</button>
    </div>

    <!-- Staff Screen -->
    <div id="staffScreen" class="screen">
        <h3>Incoming Orders</h3>
        <div id="ordersList"></div>
        <button class="btn" onclick="logout()">Logout</button>
    </div>
</div>

<script>
// Initial menu items with name and price
const items = [
    {name: "Pizza", price: 3.50},
    {name: "Burger", price: 4.00},
    {name: "Fries", price: 2.00},
    {name: "Cookie", price: 1.25},
    {name: "Drink", price: 1.50}
];

// Cart object to store items and quantities
let cart = {};

// Login logic
function login() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    if (!u) { alert('Enter a username'); return; }
    // Staff login
    if (u.toLowerCase() === 'staff' && p === 'school123') {
        document.getElementById('loginScreen').classList.remove('active');
        document.getElementById('staffScreen').classList.add('active');
        loadOrders();
        // Poll for new orders every 3 seconds to simulate real‑time updates
        if (!window.orderInterval) {
            window.orderInterval = setInterval(loadOrders, 3000);
        }
        return;
    }
    // Student login – any username with correct pin
    if (u.toLowerCase() === 'jackson' && p === '1234') {
        document.getElementById('loginScreen').classList.remove('active');
        document.getElementById('studentScreen').classList.add('active');
        loadMenu();
    } else {
        alert('Invalid login. Try Jackson/1234 for student or staff/school123 for staff.');
    }
}

// Logout logic
function logout() {
    // Stop staff polling
    if (window.orderInterval) {
        clearInterval(window.orderInterval);
        window.orderInterval = null;
    }
    document.getElementById('studentScreen').classList.remove('active');
    document.getElementById('staffScreen').classList.remove('active');
    document.getElementById('loginScreen').classList.add('active');
    cart = {};
    renderCart();
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
}

// Render menu items with Add buttons
function loadMenu() {
    const menuDiv = document.getElementById('menu');
    menuDiv.innerHTML = '';
    items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `<span>${item.name} - $${item.price.toFixed(2)}</span>` +
                        `<button onclick=\"addToCart('${item.name}', ${item.price})\">Add</button>`;
        menuDiv.appendChild(div);
    });
}

// Add item to cart
function addToCart(name, price) {
    if (!cart[name]) {
        cart[name] = {qty: 0, price: price};
    }
    cart[name].qty++;
    renderCart();
}

// Remove item from cart
function removeFromCart(name) {
    if (cart[name]) {
        cart[name].qty--;
        if (cart[name].qty <= 0) {
            delete cart[name];
        }
        renderCart();
    }
}

// Render cart contents and total
function renderCart() {
    const cartDiv = document.getElementById('cart');
    const totalDiv = document.getElementById('cartTotal');
    const names = Object.keys(cart);
    cartDiv.innerHTML = '';
    let total = 0;
    if (names.length === 0) {
        cartDiv.innerHTML = '<em>Cart is empty.</em>';
    } else {
        names.forEach(name => {
            const item = cart[name];
            const sub = item.qty * item.price;
            total += sub;
            const div = document.createElement('div');
            div.className = 'cart-item';
            div.innerHTML = `<span>${name} × ${item.qty}</span>` +
                            `<span>$${sub.toFixed(2)}</span>` +
                            `<button onclick=\"removeFromCart('${name}')\">Remove</button>`;
            cartDiv.appendChild(div);
        });
    }
    totalDiv.innerHTML = '<strong>Total:</strong> $' + total.toFixed(2);
}

// Submit order – save to localStorage and clear cart
function submitOrder() {
    if (Object.keys(cart).length === 0) {
        alert('Your cart is empty.');
        return;
    }
    const u = document.getElementById('username').value.trim();
    const orders = JSON.parse(localStorage.getItem('westviewOrders') || '[]');
    const newOrder = {
        id: Date.now(),
        user: u,
        items: Object.keys(cart).map(name => ({ name: name, qty: cart[name].qty, price: cart[name].price }))
    };
    orders.push(newOrder);
    localStorage.setItem('westviewOrders', JSON.stringify(orders));
    alert('Order submitted!');
    cart = {};
    renderCart();
}

// Load orders for staff view
function loadOrders() {
    const ordersList = document.getElementById('ordersList');
    const orders = JSON.parse(localStorage.getItem('westviewOrders') || '[]');
    if (orders.length === 0) {
        ordersList.innerHTML = '<em>No orders yet.</em>';
        return;
    }
    ordersList.innerHTML = '';
    orders.forEach(order => {
        const div = document.createElement('div');
        div.className = 'order';
        div.innerHTML = `<strong>Order #${order.id}</strong> - <em>${order.user}</em><br>` +
            order.items.map(i => `${i.qty} × ${i.name} ($${(i.qty * i.price).toFixed(2)})`).join('<br>') +
            `<br><strong>Total: $${order.items.reduce((sum,i) => sum + i.qty * i.price, 0).toFixed(2)}</strong>`;
        ordersList.appendChild(div);
    });
}
</script>

</body>
</html>
